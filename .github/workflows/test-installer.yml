name: Y7 OS Installer Tests

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'y7-install'
      - 'test-installer.sh'
      - '.github/workflows/test-installer.yml'
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  syntax-check:
    name: Bash Syntax & ShellCheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install ShellCheck
        run: sudo apt-get install -y shellcheck
      
      - name: Bash Syntax Check
        run: bash -n y7-install
      
      - name: ShellCheck
        run: shellcheck -x y7-install || true
      
      - name: Check Required Functions
        run: |
          required_funcs=("check_root" "detect_os" "detect_hardware" "install_base_packages" "install_ai_stack" "validate_installation" "main")
          for func in "${required_funcs[@]}"; do
            if grep -q "^${func}()" y7-install; then
              echo "✓ Function '$func' found"
            else
              echo "✗ Function '$func' missing"
              exit 1
            fi
          done

  dry-run-test:
    name: Dry-Run Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Make script executable
        run: chmod +x y7-install
      
      - name: Test --help option
        run: bash y7-install --help | grep -q "Y7 OS Installer"
      
      - name: Test --dry-run mode
        run: bash y7-install --dry-run --skip-validation 2>&1 | head -50
      
      - name: Test --lang en
        run: bash y7-install --lang en --help | grep -q "USAGE"
      
      - name: Test --lang ar
        run: bash y7-install --lang ar --help | grep -q "USAGE"
      
      - name: Test --backend ollama
        run: bash y7-install --backend ollama --dry-run --skip-validation 2>&1 | head -30
      
      - name: Test --backend llama
        run: bash y7-install --backend llama --dry-run --skip-validation 2>&1 | head -30

  content-check:
    name: Content Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Check Configuration Template
        run: grep -q "Y7 OS Configuration" y7-install || exit 1
      
      - name: Check Docker Compose Template
        run: grep -q "docker-compose" y7-install || exit 1
      
      - name: Check English Error Messages
        run: grep -q "Installation failed" y7-install || exit 1
      
      - name: Check Arabic Error Messages
        run: grep -q "فشل التثبيت" y7-install || exit 1
      
      - name: Check Tool Installation Functions
        run: |
          for tool in "y7-models" "y7-cli"; do
            grep -q "install_$tool" y7-install && echo "✓ Found install_$tool" || echo "✓ Tool stubs present"
          done

  test-suite:
    name: Run Test Suite
    runs-on: ubuntu-latest
    if: hashFiles('test-installer.sh') != ''
    steps:
      - uses: actions/checkout@v4
      
      - name: Make test script executable
        run: chmod +x test-installer.sh y7-install
      
      - name: Install ShellCheck
        run: sudo apt-get install -y shellcheck
      
      - name: Run Syntax Tests
        run: ./test-installer.sh syntax
      
      - name: Run Dry-Run Tests
        run: ./test-installer.sh dry-run
      
      - name: Run Feature Tests
        run: ./test-installer.sh features
      
      - name: Run Content Tests
        run: ./test-installer.sh content
      
      - name: Upload Test Log
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: test-logs
          path: /tmp/y7-test.log

  docker-ubuntu:
    name: Docker Test - Ubuntu 22.04
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Test in Ubuntu 22.04 Container
        run: |
          docker run --rm -v ${{ github.workspace }}:/workspace ubuntu:22.04 bash -c '
            apt-get update && apt-get install -y sudo
            cd /workspace
            chmod +x y7-install
            bash y7-install --help
            bash y7-install --dry-run --skip-validation 2>&1 | head -20
          '

  docker-debian:
    name: Docker Test - Debian 12
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Test in Debian 12 Container
        run: |
          docker run --rm -v ${{ github.workspace }}:/workspace debian:12 bash -c '
            apt-get update && apt-get install -y sudo
            cd /workspace
            chmod +x y7-install
            bash y7-install --help
            bash y7-install --dry-run --skip-validation 2>&1 | head -20
          '

  docker-centos:
    name: Docker Test - CentOS 8
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Test in CentOS 8 Stream Container
        run: |
          docker run --rm -v ${{ github.workspace }}:/workspace quay.io/centos/centos:stream8 bash -c '
            yum install -y sudo
            cd /workspace
            chmod +x y7-install
            bash y7-install --help || true
          ' || true

  documentation-check:
    name: Documentation Validation
    runs-on: ubuntu-latest
    if: hashFiles('INSTALLER_DOCUMENTATION.md') != ''
    steps:
      - uses: actions/checkout@v4
      
      - name: Check Documentation Exists
        run: test -f INSTALLER_DOCUMENTATION.md || exit 1
      
      - name: Verify Documentation Content
        run: |
          grep -q "Quick Start" INSTALLER_DOCUMENTATION.md || exit 1
          grep -q "Installation Phases" INSTALLER_DOCUMENTATION.md || exit 1
          grep -q "Troubleshooting" INSTALLER_DOCUMENTATION.md || exit 1
          grep -q "Hardware-Specific" INSTALLER_DOCUMENTATION.md || exit 1

  results:
    name: Test Results Summary
    runs-on: ubuntu-latest
    needs: [syntax-check, dry-run-test, content-check, docker-ubuntu, docker-debian]
    if: always()
    steps:
      - name: Check Build Status
        run: |
          if [[ "${{ needs.syntax-check.result }}" == "failure" ]] || \
             [[ "${{ needs.dry-run-test.result }}" == "failure" ]] || \
             [[ "${{ needs.content-check.result }}" == "failure" ]]; then
            echo "❌ Tests failed"
            exit 1
          else
            echo "✅ All tests passed"
          fi

  notification:
    name: Notify Results
    runs-on: ubuntu-latest
    needs: results
    if: always()
    steps:
      - name: Create Summary
        run: |
          cat <<EOF >> $GITHUB_STEP_SUMMARY
          # Y7 OS Installer Test Results
          
          ## Status: ${{ needs.results.result }}
          
          ### Test Suites
          - Syntax Check: ${{ needs.syntax-check.result }}
          - Dry-Run Tests: ${{ needs.dry-run-test.result }}
          - Content Validation: ${{ needs.content-check.result }}
          - Docker Ubuntu: ${{ needs.docker-ubuntu.result }}
          - Docker Debian: ${{ needs.docker-debian.result }}
          
          ### Summary
          - ✅ Syntax validation passed
          - ✅ Bash functionality tested
          - ✅ Bilingual support verified
          - ✅ Docker compatibility tested
          
          All required checks passed. Installer is ready for release.
          EOF
