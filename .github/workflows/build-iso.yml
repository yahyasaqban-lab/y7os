name: Build Y7 OS ISO

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., 0.3.0)'
        required: false
        default: 'dev'
      architecture:
        description: 'Architecture to build'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - amd64
          - arm64

env:
  DEBIAN_FRONTEND: noninteractive

permissions:
  contents: write

jobs:
  build-iso:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        arch: [amd64, arm64]
        exclude:
          - arch: ${{ github.event.inputs.architecture == 'amd64' && 'arm64' || '' }}
          - arch: ${{ github.event.inputs.architecture == 'arm64' && 'amd64' || '' }}
    container:
      image: debian:bookworm
      options: --privileged
    timeout-minutes: 240

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
          else
            VERSION="${{ github.event.inputs.version }}"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Building Y7 OS version: $VERSION for ${{ matrix.arch }}"

      - name: Install live-build dependencies
        run: |
          apt-get update
          apt-get install -y \
            live-build \
            debootstrap \
            squashfs-tools \
            xorriso \
            isolinux \
            syslinux-efi \
            mtools \
            dosfstools \
            git \
            curl \
            wget \
            qemu-user-static

          # Architecture-specific GRUB packages
          if [ "${{ matrix.arch }}" = "amd64" ]; then
            apt-get install -y grub-pc-bin grub-efi-amd64-bin
          else
            # ARM64: enable multi-arch for cross-building
            dpkg --add-architecture arm64
            apt-get update
            apt-get install -y grub-efi-arm64-bin:arm64
          fi

      - name: Create live-build config
        run: |
          mkdir -p build && cd build

          # Set architecture-specific options
          if [ "${{ matrix.arch }}" = "amd64" ]; then
            LINUX_FLAVOUR="linux-image-amd64"
            BOOTLOADERS="grub-efi,syslinux"
          else
            LINUX_FLAVOUR="linux-image-arm64"
            BOOTLOADERS="grub-efi"
          fi

          lb config \
            --distribution bookworm \
            --architectures ${{ matrix.arch }} \
            --archive-areas "main contrib non-free non-free-firmware" \
            --debian-installer none \
            --binary-images iso-hybrid \
            --iso-application "Y7 OS" \
            --iso-publisher "Yahya Saqban" \
            --iso-volume "Y7OS-${{ steps.version.outputs.version }}" \
            --memtest none \
            --bootloaders "$BOOTLOADERS" \
            --bootappend-live "boot=live components quiet splash persistence" \
            --apt-recommends false \
            --security false

      - name: Configure package lists
        run: |
          cd build
          mkdir -p config/package-lists

          # Base packages (architecture-independent)
          cat > config/package-lists/y7os-base.list.chroot << 'EOF'
          live-boot
          live-config
          live-tools
          systemd-sysv
          sudo
          locales
          console-setup
          network-manager
          curl
          wget
          ca-certificates
          gnupg
          openssh-client
          openssh-server
          docker.io
          git
          htop
          btop
          tmux
          neofetch
          bash-completion
          nano
          vim-tiny
          zram-tools
          python3
          python3-pip
          python3-venv
          ripgrep
          fzf
          jq
          ffmpeg
          imagemagick
          gpg
          ufw
          pciutils
          lshw
          EOF

          # Architecture-specific kernel
          if [ "${{ matrix.arch }}" = "amd64" ]; then
            echo "linux-image-amd64" > config/package-lists/y7os-kernel.list.chroot
          else
            echo "linux-image-arm64" > config/package-lists/y7os-kernel.list.chroot
          fi

      - name: Add NVIDIA GPU support (AMD64 only)
        if: matrix.arch == 'amd64'
        run: |
          cd build

          # Add NVIDIA packages to list
          cat >> config/package-lists/y7os-base.list.chroot << 'EOF'
          nvidia-detect
          EOF

          # Create GPU detection and setup script
          mkdir -p config/includes.chroot/usr/local/bin
          cat > config/includes.chroot/usr/local/bin/y7-gpu << 'SCRIPT'
          #!/bin/bash
          set -e

          VERSION="1.0.0"
          LANG="${Y7_LANG:-en}"

          show_help() {
              if [ "$LANG" = "ar" ]; then
                  echo "y7-gpu — إدارة وحدة معالجة الرسومات"
                  echo ""
                  echo "الأوامر:"
                  echo "  detect    كشف GPU"
                  echo "  install   تثبيت التعريفات"
                  echo "  status    حالة GPU"
              else
                  echo "y7-gpu — GPU management"
                  echo ""
                  echo "Commands:"
                  echo "  detect    Detect GPU hardware"
                  echo "  install   Install drivers"
                  echo "  status    Show GPU status"
              fi
          }

          detect_gpu() {
              echo "Detecting GPU..."

              # Check for NVIDIA
              if lspci | grep -i nvidia > /dev/null 2>&1; then
                  NVIDIA_CARD=$(lspci | grep -i nvidia | head -1)
                  echo "✓ NVIDIA GPU detected: $NVIDIA_CARD"

                  # Check if driver is loaded
                  if lsmod | grep -q nvidia; then
                      echo "✓ NVIDIA driver loaded"
                      nvidia-smi 2>/dev/null || echo "  (nvidia-smi not available)"
                  else
                      echo "✗ NVIDIA driver not loaded"
                      echo "  Run: y7-gpu install nvidia"
                  fi
                  return 0
              fi

              # Check for AMD
              if lspci | grep -i "amd.*radeon\|amd.*graphics" > /dev/null 2>&1; then
                  AMD_CARD=$(lspci | grep -i "amd.*radeon\|amd.*graphics" | head -1)
                  echo "✓ AMD GPU detected: $AMD_CARD"

                  if lsmod | grep -q amdgpu; then
                      echo "✓ AMDGPU driver loaded"
                  else
                      echo "  AMD GPU uses open-source drivers (amdgpu)"
                  fi
                  return 0
              fi

              # Check for Intel
              if lspci | grep -i "intel.*graphics\|intel.*uhd\|intel.*iris" > /dev/null 2>&1; then
                  INTEL_CARD=$(lspci | grep -i "intel.*graphics\|intel.*uhd\|intel.*iris" | head -1)
                  echo "✓ Intel GPU detected: $INTEL_CARD"
                  echo "  Intel GPU uses open-source drivers (i915)"
                  return 0
              fi

              echo "No dedicated GPU detected (using CPU for inference)"
              return 1
          }

          install_nvidia() {
              echo "Installing NVIDIA drivers..."

              if ! lspci | grep -i nvidia > /dev/null 2>&1; then
                  echo "Error: No NVIDIA GPU detected"
                  exit 1
              fi

              # Detect recommended driver
              RECOMMENDED=$(nvidia-detect 2>/dev/null | grep "nvidia-driver" | head -1 || echo "nvidia-driver")
              echo "Recommended driver: $RECOMMENDED"

              echo ""
              echo "This will install NVIDIA drivers. Continue? [y/N]"
              read -r response
              if [[ ! "$response" =~ ^[Yy]$ ]]; then
                  echo "Cancelled"
                  exit 0
              fi

              # Add non-free repo if needed
              if ! grep -q "non-free" /etc/apt/sources.list 2>/dev/null; then
                  echo "Adding non-free repository..."
                  sudo sed -i 's/main/main contrib non-free non-free-firmware/' /etc/apt/sources.list
              fi

              sudo apt-get update
              sudo apt-get install -y $RECOMMENDED nvidia-cuda-toolkit

              echo ""
              echo "✓ NVIDIA driver installed"
              echo "  Reboot required: sudo reboot"
              echo ""
              echo "After reboot, Ollama will automatically use GPU"
          }

          install_rocm() {
              echo "Installing AMD ROCm..."

              echo "ROCm installation requires manual setup."
              echo "Visit: https://rocm.docs.amd.com/en/latest/deploy/linux/installer/install.html"
          }

          show_status() {
              echo "=== GPU Status ==="
              echo ""

              # Try nvidia-smi first
              if command -v nvidia-smi &> /dev/null; then
                  nvidia-smi --query-gpu=name,memory.total,memory.used,utilization.gpu --format=csv,noheader 2>/dev/null && return 0
              fi

              # Fall back to lspci
              detect_gpu
          }

          case "${1:-}" in
              detect)
                  detect_gpu
                  ;;
              install)
                  case "${2:-nvidia}" in
                      nvidia) install_nvidia ;;
                      amd|rocm) install_rocm ;;
                      *) echo "Usage: y7-gpu install [nvidia|amd]" ;;
                  esac
                  ;;
              status)
                  show_status
                  ;;
              -h|--help|help|"")
                  show_help
                  ;;
              *)
                  echo "Unknown command: $1"
                  show_help
                  exit 1
                  ;;
          esac
          SCRIPT
          chmod +x config/includes.chroot/usr/local/bin/y7-gpu

      - name: Add Y7 OS tools
        run: |
          cd build
          mkdir -p config/includes.chroot/usr/local/bin
          mkdir -p config/includes.chroot/etc/skel

          # Copy y7 tools
          cp ../tools/y7-ai config/includes.chroot/usr/local/bin/ || true
          cp ../tools/y7-models config/includes.chroot/usr/local/bin/ || true
          cp ../tools/y7-status config/includes.chroot/usr/local/bin/ || true
          chmod +x config/includes.chroot/usr/local/bin/y7-* 2>/dev/null || true

          # Bashrc
          cat > config/includes.chroot/etc/skel/.bashrc << 'BASHRC'
          export PATH="$PATH:/usr/local/bin:$HOME/.local/bin"
          alias ai='y7-ai'
          alias models='y7-models'
          alias status='y7-status'
          alias gpu='y7-gpu'

          if [ ! -f ~/.y7os-welcomed ]; then
            echo ""
            echo "══════════════════════════════════════════════════"
            echo "  Y7 OS v0.3.0 — AI Stack for Linux"
            echo "  مرحباً بك في Y7 OS"
            echo "══════════════════════════════════════════════════"
            echo ""
            echo "  y7-ai       — Chat with AI (TinyLlama ready!)"
            echo "  y7-models   — Manage models"
            echo "  y7-status   — System dashboard"
            echo "  y7-gpu      — GPU detection & drivers"
            echo ""
            echo "  Persistence: Use 'y7-persist' to save data"
            echo ""
            touch ~/.y7os-welcomed
          fi
          BASHRC

      - name: Add persistence support
        run: |
          cd build
          mkdir -p config/includes.chroot/usr/local/bin

          # Persistence setup script
          cat > config/includes.chroot/usr/local/bin/y7-persist << 'SCRIPT'
          #!/bin/bash
          set -e

          LANG="${Y7_LANG:-en}"

          show_help() {
              if [ "$LANG" = "ar" ]; then
                  echo "y7-persist — إعداد التخزين الدائم"
                  echo ""
                  echo "الأوامر:"
                  echo "  setup     إنشاء قسم التخزين الدائم"
                  echo "  status    عرض حالة التخزين"
                  echo "  backup    نسخ احتياطي للإعدادات"
              else
                  echo "y7-persist — Persistence setup"
                  echo ""
                  echo "Commands:"
                  echo "  setup     Create persistence partition on USB"
                  echo "  status    Show persistence status"
                  echo "  backup    Backup settings and models"
              fi
          }

          check_persistence() {
              if grep -q "persistence" /proc/cmdline; then
                  if mount | grep -q "persistence"; then
                      echo "✓ Persistence is ACTIVE"
                      PERSIST_MOUNT=$(mount | grep persistence | awk '{print $3}')
                      PERSIST_SIZE=$(df -h "$PERSIST_MOUNT" 2>/dev/null | tail -1 | awk '{print $2}')
                      PERSIST_USED=$(df -h "$PERSIST_MOUNT" 2>/dev/null | tail -1 | awk '{print $3}')
                      echo "  Mount: $PERSIST_MOUNT"
                      echo "  Size: $PERSIST_SIZE (Used: $PERSIST_USED)"
                      return 0
                  else
                      echo "✗ Persistence enabled but not mounted"
                      echo "  Run: y7-persist setup"
                      return 1
                  fi
              else
                  echo "✗ Persistence not enabled in boot parameters"
                  return 1
              fi
          }

          setup_persistence() {
              echo "=== Y7 OS Persistence Setup ==="
              echo ""
              echo "This will create a persistence partition on your USB drive."
              echo "Your existing Y7 OS boot partition will NOT be modified."
              echo ""

              # Find the boot device
              BOOT_DEV=$(findmnt -n -o SOURCE / | sed 's/[0-9]*$//')
              echo "Detected boot device: $BOOT_DEV"
              echo ""

              # Show current partitions
              echo "Current partitions:"
              lsblk "$BOOT_DEV" 2>/dev/null || lsblk
              echo ""

              # Check for free space
              echo "Looking for free space..."
              DEVICE_SIZE=$(blockdev --getsize64 "$BOOT_DEV" 2>/dev/null || echo "0")

              echo ""
              echo "Options:"
              echo "1) Create persistence file (works on existing partition)"
              echo "2) Create persistence partition (requires free space)"
              echo "3) Cancel"
              echo ""
              read -p "Choice [1-3]: " choice

              case $choice in
                  1)
                      create_persistence_file
                      ;;
                  2)
                      echo "Creating partition requires manual partitioning."
                      echo "Use: sudo fdisk $BOOT_DEV"
                      echo "Then format: sudo mkfs.ext4 -L persistence /dev/sdXN"
                      echo "Create file: echo '/ union' | sudo tee /mnt/persistence.conf"
                      ;;
                  *)
                      echo "Cancelled"
                      ;;
              esac
          }

          create_persistence_file() {
              PERSIST_SIZE_MB="${1:-4096}"
              PERSIST_FILE="/run/live/medium/persistence.img"

              echo "Creating ${PERSIST_SIZE_MB}MB persistence file..."

              # Check if we can write to boot medium
              if [ ! -w "/run/live/medium" ]; then
                  echo "Error: Boot medium is read-only"
                  echo "Mount with write access or use a persistence partition"
                  exit 1
              fi

              # Create sparse file
              sudo dd if=/dev/zero of="$PERSIST_FILE" bs=1M count=0 seek="$PERSIST_SIZE_MB" 2>/dev/null

              # Format as ext4
              sudo mkfs.ext4 -L persistence "$PERSIST_FILE"

              # Mount and add config
              sudo mkdir -p /mnt/persist-setup
              sudo mount "$PERSIST_FILE" /mnt/persist-setup
              echo "/ union" | sudo tee /mnt/persist-setup/persistence.conf
              sudo umount /mnt/persist-setup

              echo ""
              echo "✓ Persistence file created!"
              echo "  Reboot to activate persistence"
          }

          backup_config() {
              BACKUP_DIR="${1:-$HOME/y7os-backup-$(date +%Y%m%d)}"
              mkdir -p "$BACKUP_DIR"

              echo "Backing up to: $BACKUP_DIR"

              # Backup ollama models list
              ollama list > "$BACKUP_DIR/models.txt" 2>/dev/null || true

              # Backup configs
              cp -r ~/.config/y7os "$BACKUP_DIR/" 2>/dev/null || true
              cp ~/.bashrc "$BACKUP_DIR/" 2>/dev/null || true

              echo "✓ Backup complete"
              ls -la "$BACKUP_DIR"
          }

          case "${1:-}" in
              setup)
                  setup_persistence
                  ;;
              status)
                  check_persistence
                  ;;
              backup)
                  backup_config "${2:-}"
                  ;;
              -h|--help|help|"")
                  show_help
                  ;;
              *)
                  echo "Unknown command: $1"
                  show_help
                  exit 1
                  ;;
          esac
          SCRIPT
          chmod +x config/includes.chroot/usr/local/bin/y7-persist

      - name: Bundle TinyLlama model
        run: |
          cd build
          mkdir -p config/includes.chroot/var/lib/y7os/models

          # Download TinyLlama GGUF (smallest usable model ~600MB)
          echo "Downloading TinyLlama for offline use..."
          curl -L -o config/includes.chroot/var/lib/y7os/models/tinyllama-1.1b-chat-v1.0.Q4_K_M.gguf \
            "https://huggingface.co/TheBloke/TinyLlama-1.1B-Chat-v1.0-GGUF/resolve/main/tinyllama-1.1b-chat-v1.0.Q4_K_M.gguf" || {
              echo "Warning: Could not download TinyLlama, will download on first boot"
              rm -rf config/includes.chroot/var/lib/y7os/models
            }

          # Create Modelfile for Ollama import
          if [ -f config/includes.chroot/var/lib/y7os/models/tinyllama-1.1b-chat-v1.0.Q4_K_M.gguf ]; then
            cat > config/includes.chroot/var/lib/y7os/models/Modelfile.tinyllama << 'MODELFILE'
          FROM /var/lib/y7os/models/tinyllama-1.1b-chat-v1.0.Q4_K_M.gguf
          TEMPLATE """{{ .System }}
          {{ .Prompt }}"""
          PARAMETER stop "<|im_end|>"
          PARAMETER temperature 0.7
          MODELFILE
            echo "✓ TinyLlama bundled (~600MB)"
          fi

      - name: Add boot hooks
        run: |
          cd build
          mkdir -p config/hooks/live

          cat > config/hooks/live/9000-y7os.hook.chroot << 'HOOK'
          #!/bin/bash
          set -e

          # ZRAM (50% of RAM as compressed swap)
          echo "ALGO=zstd" > /etc/default/zramswap
          echo "PERCENT=50" >> /etc/default/zramswap
          systemctl enable zramswap || true

          # Docker
          systemctl enable docker || true

          # User
          useradd -m -s /bin/bash -G sudo,docker y7 2>/dev/null || true
          echo "y7:y7" | chpasswd
          echo "y7 ALL=(ALL) NOPASSWD:ALL" > /etc/sudoers.d/y7os
          chmod 440 /etc/sudoers.d/y7os

          # Locales (English + Arabic)
          echo "en_US.UTF-8 UTF-8" >> /etc/locale.gen
          echo "ar_SA.UTF-8 UTF-8" >> /etc/locale.gen
          locale-gen

          # Set permissions for bundled models
          chown -R root:root /var/lib/y7os 2>/dev/null || true
          chmod -R 755 /var/lib/y7os 2>/dev/null || true
          HOOK
          chmod +x config/hooks/live/9000-y7os.hook.chroot

      - name: Add first-boot service
        run: |
          cd build
          mkdir -p config/includes.chroot/etc/systemd/system

          cat > config/includes.chroot/usr/local/bin/y7-first-boot << 'SCRIPT'
          #!/bin/bash
          MARKER="/var/lib/y7os/.first-boot-done"
          [ -f "$MARKER" ] && exit 0
          mkdir -p /var/lib/y7os

          LOG="/var/log/y7-first-boot.log"
          exec > >(tee -a "$LOG") 2>&1

          echo "=== Y7 OS First Boot $(date) ==="

          # Install Ollama
          echo "Installing Ollama..."
          if curl -fsSL https://ollama.com/install.sh | sh; then
              systemctl enable ollama
              systemctl start ollama
              sleep 5

              # Import bundled TinyLlama if available
              if [ -f /var/lib/y7os/models/Modelfile.tinyllama ]; then
                  echo "Importing bundled TinyLlama..."
                  cd /var/lib/y7os/models
                  ollama create tinyllama -f Modelfile.tinyllama || true
                  echo "✓ TinyLlama ready (offline)"
              fi

              # Download additional model based on RAM (if online)
              if ping -c1 google.com &>/dev/null; then
                  RAM=$(free -g | awk '/Mem:/{print $2}')
                  if [ "$RAM" -ge 8 ]; then
                      echo "Downloading Llama 3.1 8B (recommended for 8GB+ RAM)..."
                      ollama pull llama3.1:8b || true
                  elif [ "$RAM" -ge 6 ]; then
                      echo "Downloading Qwen 2.5 7B (recommended for 6GB RAM)..."
                      ollama pull qwen2.5:7b || true
                  elif [ "$RAM" -ge 4 ]; then
                      echo "Downloading Phi-3 Mini (recommended for 4GB RAM)..."
                      ollama pull phi3:mini || true
                  else
                      echo "Using bundled TinyLlama (best for <4GB RAM)"
                  fi
              else
                  echo "Offline mode: using bundled TinyLlama"
              fi
          else
              echo "Warning: Ollama installation failed"
          fi

          # Pull Open WebUI (if online)
          if ping -c1 google.com &>/dev/null; then
              echo "Pulling Open WebUI..."
              docker pull ghcr.io/open-webui/open-webui:main || true
          fi

          # Detect GPU
          if command -v y7-gpu &> /dev/null; then
              echo "Detecting GPU..."
              y7-gpu detect || true
          fi

          touch "$MARKER"
          echo "=== First boot complete ==="
          SCRIPT
          chmod +x config/includes.chroot/usr/local/bin/y7-first-boot

          cat > config/includes.chroot/etc/systemd/system/y7-first-boot.service << 'SVC'
          [Unit]
          Description=Y7 OS First Boot Setup
          After=network-online.target
          Wants=network-online.target
          ConditionPathExists=!/var/lib/y7os/.first-boot-done

          [Service]
          Type=oneshot
          ExecStart=/usr/local/bin/y7-first-boot
          RemainAfterExit=yes
          TimeoutStartSec=1800

          [Install]
          WantedBy=multi-user.target
          SVC

          # Enable in hook
          echo "systemctl enable y7-first-boot.service || true" >> config/hooks/live/9000-y7os.hook.chroot

      - name: Add MOTD
        run: |
          cd build
          mkdir -p config/includes.chroot/etc

          cat > config/includes.chroot/etc/motd << 'MOTD'

           Y7 OS v0.3.0 — AI Stack for Linux
           مكدس الذكاء الاصطناعي للينكس

           Commands: y7-ai | y7-models | y7-status | y7-gpu
           Web UI:   http://localhost:3000

           NEW: TinyLlama bundled (works offline!)
                GPU support: y7-gpu detect
                Persistence: y7-persist setup

          MOTD

          cat > config/includes.chroot/etc/issue << 'ISSUE'
          Y7 OS v0.3.0 - AI Stack for Linux
          Login: y7 / y7

          ISSUE

      - name: Build ISO
        run: |
          cd build
          lb build 2>&1 | tee build.log
          ls -la

      - name: Rename and move ISO
        run: |
          cd build
          ISO_NAME="y7os-${{ steps.version.outputs.version }}-${{ matrix.arch }}.iso"

          # Find the built ISO
          if [ -f "live-image-${{ matrix.arch }}.hybrid.iso" ]; then
            mv "live-image-${{ matrix.arch }}.hybrid.iso" "../$ISO_NAME"
            echo "ISO created: $ISO_NAME"
          elif [ -f "live-image-amd64.hybrid.iso" ]; then
            mv "live-image-amd64.hybrid.iso" "../$ISO_NAME"
          else
            echo "Looking for ISO..."
            find . -name "*.iso" -o -name "*.hybrid.iso" 2>/dev/null
            # Try to find any ISO
            ISO_FILE=$(find . -name "*.iso" -type f | head -1)
            if [ -n "$ISO_FILE" ]; then
              mv "$ISO_FILE" "../$ISO_NAME"
            fi
          fi

      - name: Generate checksums
        run: |
          ISO_NAME="y7os-${{ steps.version.outputs.version }}-${{ matrix.arch }}.iso"
          if [ -f "$ISO_NAME" ]; then
            sha256sum "$ISO_NAME" > "$ISO_NAME.sha256"
            ls -lh y7os-*
            echo "Size: $(du -h $ISO_NAME | cut -f1)"
          fi

      - name: Upload ISO artifact
        uses: actions/upload-artifact@v4
        with:
          name: y7os-${{ steps.version.outputs.version }}-${{ matrix.arch }}
          path: |
            y7os-${{ steps.version.outputs.version }}-${{ matrix.arch }}.iso
            y7os-${{ steps.version.outputs.version }}-${{ matrix.arch }}.iso.sha256
          retention-days: 30
          if-no-files-found: warn

  create-release:
    needs: build-iso
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') && contains(join(needs.*.result, ','), 'success')

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release files
        run: |
          mkdir -p release
          find artifacts -name "*.iso" -exec mv {} release/ \;
          find artifacts -name "*.sha256" -exec mv {} release/ \;
          ls -la release/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: release/*
          body: |
            ## Y7 OS v${{ github.ref_name }}

            **AI Stack for Linux — runs on any hardware**

            ### What's New in v0.3.0
            - 🖥️ **ARM64 support** — Raspberry Pi 4/5, Apple Silicon (UTM)
            - 🎮 **NVIDIA GPU detection** — `y7-gpu detect` and driver install
            - 💾 **Persistence mode** — Save data across reboots
            - 📦 **TinyLlama bundled** — Works offline immediately!

            ### Downloads

            | Architecture | Download | Use Case |
            |--------------|----------|----------|
            | **AMD64** | `y7os-*-amd64.iso` | Intel/AMD PCs, most laptops |
            | **ARM64** | `y7os-*-arm64.iso` | Raspberry Pi 4/5, Mac M1/M2/M3 (UTM), Pine64 |

            ### Quick Start
            1. Flash to USB: `sudo dd if=y7os-*.iso of=/dev/sdX bs=4M status=progress`
            2. Boot and login: `y7` / `y7`
            3. Run: `y7-ai` (works immediately, even offline!)

            ### New Commands
            ```bash
            y7-gpu detect     # Check for GPU
            y7-gpu install    # Install NVIDIA drivers
            y7-persist setup  # Enable persistence
            ```

            ### Requirements
            - 4GB RAM minimum (2GB with TinyLlama)
            - 20GB disk
            - Internet optional (TinyLlama works offline)
