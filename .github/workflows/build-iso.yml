name: Build Y7 OS ISO

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., 0.2.0)'
        required: false
        default: 'dev'

env:
  DEBIAN_FRONTEND: noninteractive

permissions:
  contents: write

jobs:
  build-iso:
    runs-on: ubuntu-latest
    container:
      image: debian:bookworm
      options: --privileged
    timeout-minutes: 180

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
          else
            VERSION="${{ github.event.inputs.version }}"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Building Y7 OS version: $VERSION"

      - name: Install live-build dependencies
        run: |
          apt-get update
          apt-get install -y \
            live-build \
            debootstrap \
            squashfs-tools \
            xorriso \
            isolinux \
            syslinux-efi \
            grub-pc-bin \
            grub-efi-amd64-bin \
            mtools \
            dosfstools \
            git

      - name: Create live-build config
        run: |
          mkdir -p build && cd build

          lb config \
            --distribution bookworm \
            --archive-areas "main contrib non-free-firmware" \
            --debian-installer none \
            --binary-images iso-hybrid \
            --iso-application "Y7 OS" \
            --iso-publisher "Yahya Saqban" \
            --iso-volume "Y7OS-${{ steps.version.outputs.version }}" \
            --memtest none \
            --bootappend-live "boot=live components quiet splash" \
            --apt-recommends false \
            --security false

      - name: Configure package lists
        run: |
          cd build
          mkdir -p config/package-lists

          cat > config/package-lists/y7os.list.chroot << 'EOF'
          linux-image-amd64
          live-boot
          systemd-sysv
          sudo
          locales
          console-setup
          network-manager
          curl
          wget
          ca-certificates
          gnupg
          openssh-client
          openssh-server
          docker.io
          git
          htop
          btop
          tmux
          neofetch
          bash-completion
          nano
          vim-tiny
          zram-tools
          python3
          python3-pip
          python3-venv
          ripgrep
          fzf
          jq
          ffmpeg
          imagemagick
          gpg
          ufw
          nginx
          EOF

      - name: Add Y7 OS tools
        run: |
          cd build
          mkdir -p config/includes.chroot/usr/local/bin
          mkdir -p config/includes.chroot/etc/skel

          # Copy y7 tools
          cp tools/y7-ai config/includes.chroot/usr/local/bin/ || true
          cp tools/y7-models config/includes.chroot/usr/local/bin/ || true
          cp tools/y7-status config/includes.chroot/usr/local/bin/ || true
          chmod +x config/includes.chroot/usr/local/bin/y7-* 2>/dev/null || true

          # Bashrc
          cat > config/includes.chroot/etc/skel/.bashrc << 'BASHRC'
          export PATH="$PATH:/usr/local/bin:$HOME/.local/bin"
          alias ai='y7-ai'
          alias models='y7-models'
          alias status='y7-status'

          if [ ! -f ~/.y7os-welcomed ]; then
            echo ""
            echo "══════════════════════════════════════════════════"
            echo "  Y7 OS — AI Stack for Linux"
            echo "  مرحباً بك في Y7 OS"
            echo "══════════════════════════════════════════════════"
            echo ""
            echo "  y7-ai       — Chat with AI"
            echo "  y7-models   — Manage models"
            echo "  y7-status   — System dashboard"
            echo ""
            touch ~/.y7os-welcomed
          fi
          BASHRC

      - name: Add boot hooks
        run: |
          cd build
          mkdir -p config/hooks/live

          cat > config/hooks/live/9000-y7os.hook.chroot << 'HOOK'
          #!/bin/bash
          set -e

          # ZRAM
          echo "ALGO=zstd" > /etc/default/zramswap
          echo "PERCENT=50" >> /etc/default/zramswap
          systemctl enable zramswap || true

          # Docker
          systemctl enable docker || true

          # User
          useradd -m -s /bin/bash -G sudo,docker y7 2>/dev/null || true
          echo "y7:y7" | chpasswd
          echo "y7 ALL=(ALL) NOPASSWD:ALL" > /etc/sudoers.d/y7os
          chmod 440 /etc/sudoers.d/y7os

          # Locales
          echo "en_US.UTF-8 UTF-8" >> /etc/locale.gen
          echo "ar_SA.UTF-8 UTF-8" >> /etc/locale.gen
          locale-gen
          HOOK
          chmod +x config/hooks/live/9000-y7os.hook.chroot

      - name: Add first-boot service
        run: |
          cd build
          mkdir -p config/includes.chroot/etc/systemd/system

          cat > config/includes.chroot/usr/local/bin/y7-first-boot << 'SCRIPT'
          #!/bin/bash
          MARKER="/var/lib/y7os/.done"
          [ -f "$MARKER" ] && exit 0
          mkdir -p /var/lib/y7os

          # Wait for network
          for i in {1..30}; do ping -c1 google.com &>/dev/null && break; sleep 2; done

          # Install Ollama
          curl -fsSL https://ollama.com/install.sh | sh
          systemctl enable ollama
          systemctl start ollama

          # Install Open WebUI
          docker pull ghcr.io/open-webui/open-webui:main

          # Download model based on RAM
          sleep 5
          RAM=$(free -g | awk '/Mem:/{print $2}')
          if [ "$RAM" -ge 8 ]; then MODEL="llama3.1:8b"
          elif [ "$RAM" -ge 6 ]; then MODEL="qwen2.5:7b"
          elif [ "$RAM" -ge 4 ]; then MODEL="phi3:mini"
          else MODEL="tinyllama"; fi
          ollama pull "$MODEL" || true

          touch "$MARKER"
          SCRIPT
          chmod +x config/includes.chroot/usr/local/bin/y7-first-boot

          cat > config/includes.chroot/etc/systemd/system/y7-first-boot.service << 'SVC'
          [Unit]
          Description=Y7 OS First Boot
          After=network-online.target
          Wants=network-online.target
          ConditionPathExists=!/var/lib/y7os/.done

          [Service]
          Type=oneshot
          ExecStart=/usr/local/bin/y7-first-boot
          RemainAfterExit=yes
          TimeoutStartSec=1800

          [Install]
          WantedBy=multi-user.target
          SVC

          # Enable in hook
          echo "systemctl enable y7-first-boot.service || true" >> config/hooks/live/9000-y7os.hook.chroot

      - name: Add MOTD
        run: |
          cd build
          mkdir -p config/includes.chroot/etc

          cat > config/includes.chroot/etc/motd << 'MOTD'

           Y7 OS — AI Stack for Linux
           مكدس الذكاء الاصطناعي للينكس

           Commands: y7-ai | y7-models | y7-status
           Web UI:   http://localhost:3000

          MOTD

          cat > config/includes.chroot/etc/issue << 'ISSUE'
          Y7 OS - AI Stack for Linux
          Login: y7 / y7

          ISSUE

      - name: Build ISO
        run: |
          cd build
          lb build 2>&1 | tee build.log
          ls -la

      - name: Move ISO
        run: |
          cd build
          if [ -f live-image-amd64.hybrid.iso ]; then
            mv live-image-amd64.hybrid.iso ../y7os-${{ steps.version.outputs.version }}-amd64.iso
            echo "ISO created successfully!"
          else
            echo "ISO not found, checking for other files..."
            find . -name "*.iso" -o -name "*.img" 2>/dev/null
          fi

      - name: Generate checksums
        run: |
          if [ -f y7os-${{ steps.version.outputs.version }}-amd64.iso ]; then
            sha256sum y7os-${{ steps.version.outputs.version }}-amd64.iso > y7os-${{ steps.version.outputs.version }}-amd64.iso.sha256
            ls -lh y7os-*
          fi

      - name: Upload ISO artifact
        uses: actions/upload-artifact@v4
        with:
          name: y7os-${{ steps.version.outputs.version }}-amd64
          path: |
            y7os-${{ steps.version.outputs.version }}-amd64.iso
            y7os-${{ steps.version.outputs.version }}-amd64.iso.sha256
          retention-days: 30
          if-no-files-found: warn

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v1
        with:
          files: |
            y7os-${{ steps.version.outputs.version }}-amd64.iso
            y7os-${{ steps.version.outputs.version }}-amd64.iso.sha256
          body: |
            ## Y7 OS v${{ steps.version.outputs.version }}

            **AI Stack for Linux — runs on any hardware**

            ### Quick Start
            1. Download the ISO
            2. Flash to USB: `sudo dd if=y7os-*.iso of=/dev/sdX bs=4M status=progress`
            3. Boot and login: `y7` / `y7`
            4. Run: `y7-ai`

            ### Included
            - Debian Bookworm base
            - Ollama (first boot install)
            - Open WebUI
            - Docker
            - y7-ai, y7-models, y7-status

            ### Requirements
            - 4GB RAM minimum
            - 20GB disk
            - Internet for first boot
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
